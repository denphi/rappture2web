<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tool.title }} - Rappture</title>
    <link rel="stylesheet" href="/static/css/rappture.css?v=20260304m">
    <script src="/static/js/plotly-3.4.0.min.js"></script>
    <script>Plotly.setPlotConfig({ topojsonURL: '/static/js/' });</script>
    <script src="/static/js/three.0.128.0.min.js"></script>
    <script src="/static/js/OrbitControls.0.128.0.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <a href="#rp-main-content" class="rp-skip-link">Skip to main content</a>
    <header class="rp-header" role="banner">
        <h1 class="rp-title">{{ tool.title }}</h1>
    </header>
    <main id="rp-main-content" class="rp-main" role="main">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/rappture.js?v=20260304m"></script>
    <script src="/static/js/rp-utils.js?v=20260304m"></script>
    <script src="/static/js/rp-renderers-simple.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-curve.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-table.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-sequence.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-field.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-field-3d.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-field-vtk.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-field-unstructured.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-field-vector.js?v=20260304m"></script>
    <script src="/static/js/rp-renderer-mapviewer.js?v=20260304m"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
